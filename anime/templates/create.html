{% extends 'main.html' %}

{% block title %}Create new {% endblock %}


{% block content %}


<div class="input_section">
    <h1 class="home_head">Welcome to the anime list app</h1>

    <form method="POST">
        {% csrf_token %}
        <h4 class="home_shead">Add your anime here</h4>

        <div>
            <input type="text" name="post" value="{% if edit_item %}{{ edit_item.title }}{% endif %}"
                class="input-value" placeholder="Enter the name here....">
        </div>
        <div class="input_btn">
            {% if edit_item %}
            <input type="hidden" name="edit_id" value="{{edit_item.id}}">
            <button class="upd_btn" type="submit">Update</button>
            {% else %}
            <button class="create_btn" type="submit">Create</button>
            {% endif %}
        </div>
    </form>
    
{% endblock %}
