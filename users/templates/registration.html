{% extends "main.html" %}
{% load crispy_forms_tags %}
{% block title %} Registration Form  {% endblock %}

{% block content %}

<div class="container">
<p class="h2">Registration form</p>

<form method="POST" class="col-6">
    {% csrf_token %}
    {{register_form|crispy}}
    <button type="submit" class="btn btn-primary">Register</button>
</form>

</div>

{% endblock %}
